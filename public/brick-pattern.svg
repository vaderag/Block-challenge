<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40">
  <!-- Top row: two half-bricks offset -->
  <rect x="0" y="2" width="38" height="16" rx="3" ry="3" fill="#000" opacity="0.12"/>
  <rect x="42" y="2" width="38" height="16" rx="3" ry="3" fill="#000" opacity="0.12"/>
  <!-- Studs top row -->
  <circle cx="14" cy="6" r="3" fill="#000" opacity="0.09"/>
  <circle cx="26" cy="6" r="3" fill="#000" opacity="0.09"/>
  <circle cx="56" cy="6" r="3" fill="#000" opacity="0.09"/>
  <circle cx="68" cy="6" r="3" fill="#000" opacity="0.09"/>

  <!-- Bottom row: one full brick -->
  <rect x="2" y="22" width="76" height="16" rx="3" ry="3" fill="#000" opacity="0.12"/>
  <!-- Studs bottom row -->
  <circle cx="14" cy="26" r="3" fill="#000" opacity="0.09"/>
  <circle cx="28" cy="26" r="3" fill="#000" opacity="0.09"/>
  <circle cx="42" cy="26" r="3" fill="#000" opacity="0.09"/>
  <circle cx="56" cy="26" r="3" fill="#000" opacity="0.09"/>
  <circle cx="70" cy="26" r="3" fill="#000" opacity="0.09"/>
</svg>
